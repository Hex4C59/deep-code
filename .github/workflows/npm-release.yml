name: npm release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the package to npm
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init -b main .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force --detach FETCH_HEAD

      - name: Setup npm registry
        run: |
          node --version
          npm --version
          npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Pack package
        run: npm pack

      - name: Upload package to GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          gh release view "$VERSION" >/dev/null 2>&1 || gh release create "$VERSION" --title "$VERSION" --notes ""
          gh release upload "$VERSION" ./*.tgz --clobber

      - name: Publish to npm
        if: github.event_name == 'push' || inputs.publish == true
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > ~/.npmrc
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "close-code@${VERSION}" version >/dev/null 2>&1; then
            echo "close-code@${VERSION} already exists on npm, skipping publish."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
