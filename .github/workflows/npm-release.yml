name: npm release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the package to npm
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c http.extraheader="AUTHORIZATION: bearer $GITHUB_TOKEN" fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force --detach FETCH_HEAD

      - name: Setup npm registry
        run: |
          node --version
          npm --version
          npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Pack package
        run: npm pack

      - name: Upload package to GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes ""
          gh release upload "$GITHUB_REF_NAME" ./*.tgz --clobber

      - name: Publish to npm
        if: github.event_name == 'push' || inputs.publish == true
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
